# Render Blueprint — Full production stack (ClickHouse + agent worker)
# Use after demo deploy is working. Apply as a separate blueprint or merge manually.

services:
  - type: web
    name: startup-scout
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/stats
    envVars:
      - key: DEMO_MODE
        value: "false"
      - key: NODE_ENV
        value: production
      - key: CLICKHOUSE_HOST
        fromService:
          type: pserv
          name: startup-scout-clickhouse
          property: hostport
      - key: OPENAI_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false

  - type: worker
    name: startup-scout-agents
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: npm run agents:start
    envVars:
      - key: DEMO_MODE
        value: "false"
      - key: CLICKHOUSE_HOST
        fromService:
          type: pserv
          name: startup-scout-clickhouse
          property: hostport
      - key: DISCOVERY_INTERVAL_MINUTES
        value: "15"
      - key: OPENAI_API_KEY
        sync: false

  - type: pserv
    name: startup-scout-clickhouse
    runtime: docker
    image: clickhouse/clickhouse-server:24.3
    disk:
      name: clickhouse-data
      mountPath: /var/lib/clickhouse
      sizeGB: 10
