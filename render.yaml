# Live deploy — Neon PostgreSQL + Google Gemini + GitHub API
# Render Dashboard → New → Blueprint → connect repo → Apply
# After Apply, set DATABASE_URL, GEMINI_API_KEY, GITHUB_TOKEN in Render's Environment tab

services:
  - type: web
    name: startup-scout
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/stats
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: "false"
      - key: NEXT_PUBLIC_DEMO_MODE
        value: "false"
      - key: NODE_VERSION
        value: "20"
      - key: DISCOVERY_INTERVAL_MINUTES
        value: "15"
      - key: SCORE_THRESHOLD
        value: "85"
      # Set these in Render's Environment tab (not committed to git):
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
