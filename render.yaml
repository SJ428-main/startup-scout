# Demo deploy — free, no ClickHouse, no API keys required
# Render Dashboard → New → Blueprint → connect repo → Apply

services:
  - type: web
    name: startup-scout
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/stats
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: "true"
      - key: NODE_VERSION
        value: "20"
      # Optional — leave blank for free demo
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
