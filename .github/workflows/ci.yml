name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DEMO_MODE: "true"

  demo-pipeline:
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run demo pipeline
        run: npm run demo
        env:
          DEMO_MODE: "true"

  clickhouse-integration:
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.event_name == 'push'

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.3
        ports:
          - 8123:8123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8123/ping && break
            sleep 2
          done

      - name: Initialize schema
        run: npm run db:init
        env:
          CLICKHOUSE_HOST: http://localhost:8123
